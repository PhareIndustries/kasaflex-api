spring.application.name=api
spring.config.import=optional:file:.env[.properties]

# PostgreSQL (serveur distant via .env)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kasaflex_db}
spring.datasource.username=${DB_USERNAME:kasaflex_user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# InfluxDB (docker-compose local)
management.influx.metrics.export.uri=http://localhost:8086
management.influx.metrics.export.org=kasaflex_org
management.influx.metrics.export.bucket=kasaflex_mesures
management.influx.metrics.export.token=KasaflexToken123456

# JWT
jwt.secret=${JWT_SECRET:kasaflex-dev-secret-key-change-in-production-32b}
jwt.expiration=${JWT_EXPIRATION:86400000}
