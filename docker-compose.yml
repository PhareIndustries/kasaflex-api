services:
  postgres:
    image: postgres:16
    container_name: kasaflex_postgres
    restart: always
    environment:
      POSTGRES_DB: kasaflex_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:2.7
    container_name: kasaflex_influxdb
    restart: always
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: root
      DOCKER_INFLUXDB_INIT_ORG: kasaflex_org
      DOCKER_INFLUXDB_INIT_BUCKET: kasaflex_mesures
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: kasaflex-super-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

volumes:
  postgres_data:
  influxdb_data:
  influxdb_config: